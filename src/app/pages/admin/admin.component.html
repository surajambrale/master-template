<div class="admin">

  <!-- 🔐 LOGIN -->
  <div *ngIf="!isLoggedIn" class="login-box">
    <h2>Admin Login</h2>
    <input type="password" [(ngModel)]="password" placeholder="Enter password">
    <button (click)="login()">Login</button>
  </div>

  <!-- 📊 DASHBOARD -->
  <div *ngIf="isLoggedIn">

    <button (click)="logout()" style="margin-bottom: 20px; background: red; color: white;">
      Logout
    </button>

    <!-- 🔥 CENTRAL ACCESS CONTROL -->
    <div class="card" style="margin-bottom: 20px;">
      <h3>Grant Book Access</h3>

      <select [(ngModel)]="selectedUser">
        <option value="">Select User</option>
        <option *ngFor="let u of users" [value]="u._id">
          {{ u.name }} ({{ u.phone }})
        </option>
      </select>

      <select [(ngModel)]="selectedBook">
        <option value="">Select Book</option>
        <option *ngFor="let b of books" [value]="b.id">
          {{ b.name }}
        </option>
      </select>

      <button (click)="grantAccess()">Give Access</button>
    </div>
<!-- 🔥 CENTRAL ACCESS CONTROL -->

    <h2>Users</h2>
    <div *ngFor="let user of users" class="card">
      <p><b>Name:</b> {{user.name}}</p>
      <p><b>Phone:</b> {{user.phone}}</p>

      <button (click)="deleteUser(user._id)">Delete</button>
    </div>

    <h2>Purchases</h2>
    <div *ngFor="let p of purchases" class="card">
       <p><b>Name:</b> {{p.userName}}</p>
       <p><b>Phone:</b> {{p.userPhone}}</p>
       <p><b>Book ID:</b> {{p.bookId}}</p>
       <p><b>Book:</b> {{ getBookName(p.bookId) }}</p>
       <p><b>Payment ID:</b> {{p.paymentId}}</p>

       <button (click)="deletePurchase(p._id)">Delete Purchase</button>
    </div>

  </div>

</div>
