<div class="book-detail" *ngIf="book">

  <div class="top-section">

    <div class="image">
      <img [src]="book.image" />
    </div>

    <div class="details">
      <h1>{{ book.title }}</h1>
      <p class="author">{{ book.author }}</p>

      <div class="rating">
        ⭐⭐⭐⭐☆ ({{ book.reviews }})
      </div>

      <h2 class="price">₹{{ book.price }}</h2>

      <!-- 🔥 BUTTONS -->
      <div class="actions">

        <button class="buy" *ngIf="hasAccess" (click)="readBook()">
          Read Book
        </button>

        <button (click)="buyBook()" [disabled]="isLoading">
  <span *ngIf="!isLoading">Buy Now</span>
  <span *ngIf="isLoading" class="btn-loader"></span>
</button>

      </div>

      <!-- book preview code start -->

      <!-- 🔥 BOOK PREVIEW -->
<div class="preview-section" *ngIf="book.previewImages?.length">

  <h3>Preview Pages</h3>

  <div class="slider">
    <button class="nav-btn left" (click)="prevImage()">‹</button>

    <div class="image-frame">
    <img [src]="book.previewImages[currentImageIndex]" class="preview-img"
     (touchstart)="onTouchStart($event)"
     (touchend)="onTouchEnd($event)"   
    />
    </div>
    
    <button class="nav-btn right" (click)="nextImage()">›</button>
  </div>

  <div class="dots">
    <span *ngFor="let img of book.previewImages; let i = index"
          [class.active]="i === currentImageIndex"
          (click)="goToImage(i)">
    </span>
  </div>

</div>

  <!-- book preview code end -->

      <!-- 🔥 MOVE DESCRIPTION HERE -->
      <div class="description">
        <h3>Book Overview</h3>
        <p>{{ book.description }}</p>
      </div>

    </div>

  </div>

</div>

<!-- WhatsApp Floating Button -->

  class="whatsapp-float" 
  target="_blank"
>
  <img src="assets/images/whatsapp.png" alt="WhatsApp" />
